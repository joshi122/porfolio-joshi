<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>New Project – Portfolio Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 40px; width: 100%; max-width: 500px; }
        h1 { font-size: 1.6rem; margin-bottom: 24px; color: #f1f5f9; }
        label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #94a3b8; }
        input, textarea {
            width: 100%; padding: 10px 14px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; color: #f1f5f9; font-size: 0.95rem; margin-bottom: 16px;
        }
        textarea { height: 100px; resize: vertical; }
        input:focus, textarea:focus { outline: none; border-color: #6366f1; }
        .actions { display: flex; gap: 12px; }
        button { flex: 1; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #4f46e5; }
        a.cancel { flex: 1; padding: 12px; text-align: center; background: transparent; color: #94a3b8; border: 1px solid #334155; border-radius: 8px; text-decoration: none; font-size: 1rem; }
    </style>
</head>
<body>
<div class="card">
    <h1>➕ New Project</h1>
    <form th:action="@{/projects/new}" method="post">
        <label>Project Title</label>
        <input type="text" name="title" placeholder="My Awesome Project" required/>

        <label>Description</label>
        <textarea name="description" placeholder="Describe your project..."></textarea>

        <label>Technologies (comma separated)</label>
        <input type="text" name="technologies" placeholder="Java, Spring Boot, Docker"/>

        <div class="actions">
            <a th:href="@{/dashboard}" class="cancel">Cancel</a>
            <button type="submit">Create Project</button>
        </div>
    </form>
</div>
</body>
</html>
