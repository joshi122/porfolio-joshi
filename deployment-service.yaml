apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-tracker
  namespace: webapps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-tracker
  template:
    metadata:
      labels:
        app: portfolio-tracker
    spec:
      tolerations:
        - key: "CriticalAddonsOnly"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: portfolio-tracker
          image: joshi122/portfolio:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-tracker-service
  namespace: webapps
spec:
  type: LoadBalancer
  selector:
    app: portfolio-tracker
  ports:
    - port: 80
      targetPort: 8080
