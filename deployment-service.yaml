apiVersion: v1
kind: Namespace
metadata:
  name: production

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-tracker
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-tracker
  template:
    metadata:
      labels:
        app: portfolio-tracker
    spec:
      containers:
        - name: portfolio-tracker
          image: joshi122/portfolio:latest   # ✅ matches Jenkins pipeline
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-tracker-service
  namespace: production
spec:
  type: LoadBalancer
  selector:
    app: portfolio-tracker
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
